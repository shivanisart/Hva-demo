<!DOCTYPE html>
<html>
<head>
  <title>HVA Events Demo</title>

  <!-- Calendar -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

  <!-- Map -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    :root {
      /* 🎨 HVA-style approximate palette */
      --primary: #4f6f52;     /* muted green */
      --secondary: #a3b18a;   /* soft sage */
      --background: #f6f3ee;  /* warm off-white */
      --text: #2b2b2b;
      --accent: #d4a373;      /* warm art tone */
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--background);
      color: var(--text);
    }

    header {
      background: var(--primary);
      color: white;
      padding: 12px 20px;
      font-size: 18px;
    }

    #layout {
      display: flex;
      height: calc(100vh - 50px);
    }

    #calendar {
      width: 50%;
      padding: 10px;
      background: white;
      border-right: 3px solid var(--secondary);
    }

    #map {
      width: 50%;
      height: 100%;
    }

    /* Calendar styling */
    .fc .fc-button {
      background: var(--primary) !important;
      border: none !important;
    }

    .fc-event {
      background: var(--accent) !important;
      border: none !important;
    }
  </style>
</head>

<body>

<header>
  HVA Events Demo — Calendar + Map System
</header>

<div id="layout">
  <div id="calendar"></div>
  <div id="map"></div>
</div>

<script>
/* ---------------- DATA ---------------- */
const events = [
  {
    title: "Art Exhibition",
    start: "2026-06-25T14:00:00",
    lat: 51.5074,
    lng: -0.1278
  },
  {
    title: "Creative Workshop",
    start: "2026-06-26T10:00:00",
    lat: 51.5155,
    lng: -0.0922
  },
  {
    title: "Gallery Walk",
    start: "2026-06-27T16:00:00",
    lat: 51.5033,
    lng: -0.1195
  }
];

/* ---------------- CALENDAR ---------------- */
const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
  initialView: 'dayGridMonth',
  events: events,

  eventClick: function(info) {
    const ev = events.find(e => e.title === info.event.title);
    if (ev) {
      map.setView([ev.lat, ev.lng], 14);
      markers.forEach(m => {
        if (m.title === ev.title) m.openPopup();
      });
    }
  }
});

calendar.render();

/* ---------------- MAP ---------------- */
const map = L.map('map').setView([51.5074, -0.1278], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap'
}).addTo(map);

/* ---------------- MARKERS ---------------- */
const markers = [];

events.forEach(ev => {
  const marker = L.marker([ev.lat, ev.lng])
    .addTo(map)
    .bindPopup(`<b>${ev.title}</b><br>${ev.start}`);

  marker.title = ev.title;
  markers.push(marker);
});
</script>

</body>
</html>
