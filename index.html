<!DOCTYPE html>
<html>
<head>
  <title>Events Hub</title>

  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f6f3ee;
    }

    header {
      background: #4f6f52;
      color: white;
      padding: 15px;
      font-size: 18px;
    }

    #layout {
      display: flex;
      height: calc(100vh - 60px);
    }

    #calendar {
      width: 50%;
      padding: 10px;
      background: white;
    }

    #map {
      width: 50%;
      height: 100%;
    }

    .fc-event {
      background: #d4a373 !important;
      border: none !important;
    }

    .fc-button {
      background: #4f6f52 !important;
      border: none !important;
    }
  </style>
</head>

<body>

<header>
  Events Hub — Calendar & Map
</header>

<div id="layout">
  <div id="calendar"></div>
  <div id="map"></div>
</div>

<script>
const events = [
  {
    id: "big-art-fair",
    title: "Big Art Fair",
    start: "2026-07-10T10:00:00",
    lat: 51.5074,
    lng: -0.1278
  }
];

/* CALENDAR */
const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
  initialView: 'dayGridMonth',
  events: events,

  eventClick: function(info) {
    const ev = events.find(e => e.title === info.event.title);
    window.location.href = `big-art-fair.html?id=${ev.id}`;
  }
});

calendar.render();

/* MAP */
const map = L.map('map').setView([51.5074, -0.1278], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap'
}).addTo(map);

events.forEach(ev => {
  L.marker([ev.lat, ev.lng])
    .addTo(map)
    .on('click', () => {
      window.location.href = `big-art-fair.html?id=${ev.id}`;
    });
});
</script>

</body>
</html>
